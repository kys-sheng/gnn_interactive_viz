<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DGNN — editable feature space</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#fff;color:#3d3d3a;padding:1rem}
@media(prefers-color-scheme:dark){body{background:#1a1a18;color:#c2c0b6}}
.panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:.75rem}
.panel{border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;overflow:hidden}
@media(prefers-color-scheme:dark){.panel{border-color:rgba(255,255,255,0.12)}}
.plabel{font-size:11px;font-weight:500;color:#888;letter-spacing:.06em;text-transform:uppercase;padding:7px 12px 0}
.phint{font-size:10px;color:#aaa;padding:1px 12px 5px;min-height:16px}
canvas{display:block;width:100%}
#gC{cursor:grab}#gC.dragging{cursor:grabbing}
#fC.editable{cursor:crosshair}#fC.fdragging{cursor:grabbing}
.desc{font-size:12px;color:#888;line-height:1.6;margin-bottom:.75rem;padding:8px 12px;border-radius:8px;background:rgba(0,0,0,0.04);min-height:38px}
@media(prefers-color-scheme:dark){.desc{background:rgba(255,255,255,0.05);color:#888780}}
.mono{font-family:monospace;font-size:12px;color:#3d3d3a}
@media(prefers-color-scheme:dark){.mono{color:#c2c0b6}}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.85rem}
.stat{background:rgba(0,0,0,0.04);border-radius:8px;padding:7px 13px;flex:1;min-width:90px}
@media(prefers-color-scheme:dark){.stat{background:rgba(255,255,255,0.05)}}
.sv{font-size:16px;font-weight:500}
.sl{font-size:11px;color:#aaa;margin-top:1px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.75rem}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl{display:flex;align-items:stretch;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;overflow:hidden;margin-bottom:.85rem}
@media(prefers-color-scheme:dark){.tl{border-color:rgba(255,255,255,0.12)}}
.tl-t{display:flex;flex-direction:column;flex:1;min-width:0;border-right:0.5px solid rgba(0,0,0,0.2)}
.tl-t:last-child{border-right:none}
@media(prefers-color-scheme:dark){.tl-t{border-right-color:rgba(255,255,255,0.15)}}
.tl-h{font-size:10px;font-weight:500;color:#aaa;padding:4px 0 3px;text-align:center;border-bottom:0.5px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.03)}
@media(prefers-color-scheme:dark){.tl-h{background:rgba(255,255,255,0.04);border-bottom-color:rgba(255,255,255,0.1)}}
.tl-ps{display:flex}
.tl-p{flex:1;font-size:9px;text-align:center;padding:5px 2px;cursor:pointer;color:#aaa;border-right:0.5px solid rgba(0,0,0,0.08);transition:background .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-p:last-child{border-right:none}
.tl-p:hover{background:rgba(0,0,0,0.05)}
.tl-p.active{background:rgba(0,0,0,0.07);color:#3d3d3a;font-weight:500}
.tl-p.done{color:#888}
@media(prefers-color-scheme:dark){.tl-p{color:#666;border-right-color:rgba(255,255,255,0.08)}.tl-p:hover{background:rgba(255,255,255,0.05)}.tl-p.active{background:rgba(255,255,255,0.07);color:#c2c0b6}.tl-p.done{color:#888780}}
.bot{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{font-size:13px;padding:5px 16px;border-radius:8px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#3d3d3a;font-family:inherit}
.btn:disabled{opacity:.3;cursor:default}
@media(prefers-color-scheme:dark){.btn{background:#1a1a18;color:#c2c0b6;border-color:rgba(255,255,255,0.2)}}
.tgl{font-size:12px;padding:4px 11px;border-radius:6px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#888;font-family:inherit}
.tgl.on{background:rgba(0,0,0,0.06);color:#3d3d3a}
@media(prefers-color-scheme:dark){.tgl{background:#1a1a18;color:#888780;border-color:rgba(255,255,255,0.15)}.tgl.on{background:rgba(255,255,255,0.07);color:#c2c0b6}}
.sind{font-size:12px;color:#aaa;white-space:nowrap}
.krow{display:flex;align-items:center;gap:6px;margin-left:auto}
.krow label{font-size:12px;color:#aaa}
.krow span{font-size:12px;font-weight:500;min-width:14px}
.epill{font-size:10px;padding:1px 7px;border-radius:20px;background:#dbeeff;color:#185FA5;margin-left:7px;vertical-align:middle;display:none}
@media(prefers-color-scheme:dark){.epill{background:#0c447c33;color:#85B7EB}}
</style>
</head>
<body>

<div class="desc" id="desc"></div>
<div class="panels">
  <div class="panel">
    <div class="plabel">Graph topology — drag nodes</div>
    <div class="phint" id="gHint"></div>
    <canvas id="gC" height="280"></canvas>
  </div>
  <div class="panel">
    <div class="plabel">Feature space<span class="epill" id="epill">editing t=0</span></div>
    <div class="phint" id="fHint"></div>
    <canvas id="fC" height="280"></canvas>
  </div>
</div>
<div class="legend" id="legend"></div>
<div class="tl" id="tl"></div>
<div class="stats" id="stats"></div>
<div class="bot">
  <button class="btn" id="prevBtn" onclick="navigate(-1)">← Prev</button>
  <span class="sind" id="sind"></span>
  <button class="btn" id="nextBtn" onclick="navigate(1)">Next →</button>
  <button class="tgl" id="trailBtn" onclick="toggleTrail()">Trails</button>
  <button class="tgl" id="playBtn" onclick="togglePlay()">Play</button>
  <button class="tgl" onclick="resetAll()">Reset all</button>
  <div class="krow"><label>GNN k=</label><input type="range" id="ks" min="1" max="4" step="1" value="1" style="width:55px" oninput="onLayer(+this.value)"><span id="kv">1</span></div>
  <div class="krow"><label>kNN=</label><input type="range" id="knn" min="1" max="7" step="1" value="2" style="width:55px" oninput="onKnn(+this.value)"><span id="knnv">2</span></div>
</div>

<script>
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
const BG=dark?'#1a1a18':'#fff';
const FG=dark?'#c2c0b6':'#3d3d3a';
const FGM=dark?'#666':'#aaa';
const GR=dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)';
const BD=dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)';

const NC=dark?'#7F77DD':'#534AB7';
const NL=dark?'#3C3489':'#EEEDFE';
const NODES=[
  {id:0,lbl:'v0'},{id:1,lbl:'v1'},{id:2,lbl:'v2'},{id:3,lbl:'v3'},
  {id:4,lbl:'v4'},{id:5,lbl:'v5'},{id:6,lbl:'v6'},{id:7,lbl:'v7'},
];
const D_GPOS=[[.18,.28],[.18,.72],[.82,.28],[.82,.72],[.18,.50],[.82,.50],[.50,.18],[.50,.82]];
const D_FEAT=[[.15,.82],[.22,.71],[.78,.80],[.85,.68],[.12,.18],[.20,.25],[.30,.75],[.72,.60]];
const TEVENTS=[
  {edges:[],note:'kNN edges from initial feature positions'},
  {edges:[[0,6],[1,6]],note:'v6 bridges v0 and v1'},
  {edges:[[2,7],[3,7]],note:'v7 joins cluster'},
  {edges:[[0,2],[4,6]],note:'new cross edges'},
  {edges:[[1,4],[3,5]],note:'more cross edges'},
  {edges:[[0,4],[2,5],[6,4]],note:'dense mixing'},
];
const PH=['Init','Messages','Aggregate','Update'];
const FORM=['h\u1d65\u2070=x_v','m\u1d64\u1d65=M(h\u1d64,h\u1d65)','M\u1d65=AGG({m\u1d64\u1d65:u\u2208N(v)})','h\u1d65\u207a=ReLU(W\u00b7[h\u1d65\u2016M\u1d65])'];
const DESC=[
  t=>`t=${t}: ${TEVENTS[t].note}. `+(t===0?'Drag nodes in feature space or adjust kNN to change which edges form.':'Positions evolved from your t=0 layout.'),
  t=>`t=${t}: neighbors of v0 send messages — arrows animate in both panels.`,
  t=>`t=${t}: messages pooled into M_v0. Centroid shown as dashed marker in feature space.`,
  t=>`t=${t}: v0 updated — watch it slide toward its neighborhood centroid.`,
];

const T_MAX=5,FOCUS=0;
let curT=0,curP=0,curK=1,curKNN=2,trail=false,playing=false,ptimer=null;
let ap=0,afr=null;
let gpos=D_GPOS.map(p=>[...p]);
let ifeat=D_FEAT.map(f=>[...f]);
let gdrag=-1,gdx=0,gdy=0;
let fdrag=-1,fdx=0,fdy=0;

function computeKNN(k){
  const result=new Set();
  NODES.forEach(n=>{
    const dists=NODES.filter(m=>m.id!==n.id).map(m=>({id:m.id,d:Math.hypot(ifeat[n.id][0]-ifeat[m.id][0],ifeat[n.id][1]-ifeat[m.id][1])}));
    dists.sort((a,b)=>a.d-b.d);
    dists.slice(0,k).forEach(m=>{const key=Math.min(n.id,m.id)+'-'+Math.max(n.id,m.id);result.add(key);});
  });
  return [...result].map(s=>s.split('-').map(Number));
}

function edges(t){
  const s=new Set();
  computeKNN(curKNN).forEach(e=>s.add(e[0]+'-'+e[1]));
  for(let i=1;i<=t;i++)TEVENTS[i].edges.forEach(e=>s.add(Math.min(e[0],e[1])+'-'+Math.max(e[0],e[1])));
  return[...s].map(x=>x.split('-').map(Number));
}
function nbrs(n,t){return edges(t).filter(e=>e[0]===n||e[1]===n).map(e=>e[0]===n?e[1]:e[0]);}
function feats(t,k){
  const es=edges(t);let h=ifeat.map(f=>[...f]);
  const a0=0.72*(1+t*0.08);
  for(let l=0;l<k;l++){
    const nH=h.map(f=>[...f]);
    NODES.forEach(n=>{
      const nb=es.filter(e=>e[0]===n.id||e[1]===n.id).map(e=>e[0]===n.id?e[1]:e[0]);
      if(!nb.length)return;
      const ag=[0,0];nb.forEach(ni=>{ag[0]+=h[ni][0];ag[1]+=h[ni][1];});ag[0]/=nb.length;ag[1]/=nb.length;
      const a=Math.min(0.92,a0*(1+l*.2));
      nH[n.id][0]=Math.max(.02,Math.min(.98,h[n.id][0]*(1-a)+ag[0]*a));
      nH[n.id][1]=Math.max(.02,Math.min(.98,h[n.id][1]*(1-a)+ag[1]*a));
    });h=nH;
  }
  return h;
}
function sc(v,sz,p){return p+v*(sz-2*p);}
function inv(px,sz,p){return Math.max(.02,Math.min(.98,(px-p)/(sz-2*p)));}
function cxy(cv,e){const r=cv.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return[cx-r.left,cy-r.top];}
function hitG(x,y,W,H){for(let i=NODES.length-1;i>=0;i--){const nx=sc(gpos[i][0],W,28),ny=sc(gpos[i][1],H,28);if(Math.hypot(x-nx,y-ny)<=13)return i;}return -1;}
function hitF(x,y,W,H,f){for(let i=NODES.length-1;i>=0;i--){const nx=sc(f[i][0],W,30),ny=H-sc(f[i][1],H,30);if(Math.hypot(x-nx,y-ny)<=13)return i;}return -1;}
function isInit(){return curT===0&&curP===0;}

function initDrags(){
  const gc=document.getElementById('gC'),fc=document.getElementById('fC');
  function gdn(e){const[x,y]=cxy(gc,e);const W=gc.offsetWidth,H=gc.offsetHeight||280;const h=hitG(x,y,W,H);if(h<0)return;gdrag=h;gdx=x-sc(gpos[h][0],W,28);gdy=y-sc(gpos[h][1],H,28);gc.classList.add('dragging');e.preventDefault();}
  function gmv(e){if(gdrag<0)return;const[x,y]=cxy(gc,e);const W=gc.offsetWidth,H=gc.offsetHeight||280;gpos[gdrag][0]=inv(x-gdx,W,28);gpos[gdrag][1]=inv(y-gdy,H,28);draw();e.preventDefault();}
  function gup(){gdrag=-1;gc.classList.remove('dragging');}
  gc.addEventListener('mousedown',gdn);window.addEventListener('mousemove',gmv);window.addEventListener('mouseup',gup);
  gc.addEventListener('touchstart',gdn,{passive:false});window.addEventListener('touchmove',gmv,{passive:false});window.addEventListener('touchend',gup);

  function fdn(e){if(!isInit())return;const[x,y]=cxy(fc,e);const W=fc.offsetWidth,H=fc.offsetHeight||280;const cur=ifeat;const h=hitF(x,y,W,H,cur);if(h<0)return;fdrag=h;fdx=x-sc(cur[h][0],W,30);fdy=y-(H-sc(cur[h][1],H,30));fc.classList.add('fdragging');e.preventDefault();}
  function fmv(e){if(fdrag<0)return;const[x,y]=cxy(fc,e);const W=fc.offsetWidth,H=fc.offsetHeight||280;ifeat[fdrag][0]=inv(x-fdx,W,30);ifeat[fdrag][1]=inv(H-(y-fdy),H,30);draw();e.preventDefault();}
  function fup(){fdrag=-1;fc.classList.remove('fdragging');}
  fc.addEventListener('mousedown',fdn);window.addEventListener('mousemove',fmv);window.addEventListener('mouseup',fup);
  fc.addEventListener('touchstart',fdn,{passive:false});window.addEventListener('touchmove',fmv,{passive:false});window.addEventListener('touchend',fup);
}

function drawGraph(){
  const cv=document.getElementById('gC');
  const W=cv.offsetWidth||300,H=280,pad=28;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
  const ctx=cv.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  const es=edges(curT);const knnSet=new Set(computeKNN(curKNN).map(e=>e[0]+'-'+e[1]));
  const newTempEdges=new Set(curT>0?TEVENTS[curT].edges.map(e=>Math.min(e[0],e[1])+'-'+Math.max(e[0],e[1])):[]);
  const nb=curP>=1?nbrs(FOCUS,curT):[];const ms=new Set(nb.map(n=>Math.min(n,FOCUS)+'-'+Math.max(n,FOCUS)));
  es.forEach(([u,v])=>{
    const key=Math.min(u,v)+'-'+Math.max(u,v);
    const isM=curP>=1&&ms.has(key);const isKnn=knnSet.has(key);const isNew=newTempEdges.has(key)&&!isKnn;
    const x0=sc(gpos[u][0],W,pad),y0=sc(gpos[u][1],H,pad),x1=sc(gpos[v][0],W,pad),y1=sc(gpos[v][1],H,pad);
    ctx.lineWidth=isM?2:isNew?1.5:isKnn?1:.75;
    ctx.strokeStyle=isM?NC:isNew?'#378ADD':isKnn?(dark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.25)'):BD;
    ctx.globalAlpha=isM?1:isNew?.85:isKnn?.6:.4;ctx.setLineDash(isKnn&&!isNew?[3,3]:[]);
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();ctx.setLineDash([]);
    if(isM&&ap>0){const a=Math.min(1,ap);ctx.globalAlpha=1;ctx.fillStyle=NC;ctx.beginPath();ctx.arc(x0+(x1-x0)*a,y0+(y1-y0)*a,4,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  });
  NODES.forEach(n=>{
    const x=sc(gpos[n.id][0],W,pad),y=sc(gpos[n.id][1],H,pad);
    const iF=n.id===FOCUS&&curP>0,iN=nb.includes(n.id)&&curP>=1,iU=curP===3&&n.id===FOCUS,iD=gdrag===n.id,r=iF||iN?10:8;
    if(iF||iN||iU||iD){ctx.beginPath();ctx.arc(x,y,r+5,0,Math.PI*2);ctx.fillStyle=NL;ctx.globalAlpha=iD?.55:.35;ctx.fill();ctx.globalAlpha=1;}
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=(iF||iN||iU||iD)?NC:NL;ctx.fill();
    ctx.strokeStyle=BG;ctx.lineWidth=iD?2:1.5;ctx.stroke();
    if(curP===2&&n.id===FOCUS){ctx.beginPath();ctx.arc(x,y,r+7,0,Math.PI*2);ctx.strokeStyle=NC;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.globalAlpha=.6;ctx.stroke();ctx.globalAlpha=1;ctx.setLineDash([]);}
    ctx.font='10px sans-serif';ctx.fillStyle=(iF||iN||iU||iD)?'#fff':NC;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.lbl,x,y);
  });
}

function drawFeature(){
  const cv=document.getElementById('fC');
  const W=cv.offsetWidth||300,H=280,pad=30;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
  const ctx=cv.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  const editable=isInit();
  cv.className=editable?'editable':fdrag>=0?'fdragging':'';
  if(editable){ctx.fillStyle=dark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.015)';ctx.fillRect(pad,pad,W-2*pad,H-2*pad);}
  ctx.strokeStyle=GR;ctx.lineWidth=.5;
  [.25,.5,.75].forEach(v=>{const x=sc(v,W,pad),y=sc(v,H,pad);ctx.beginPath();ctx.moveTo(x,pad);ctx.lineTo(x,H-pad);ctx.stroke();ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();});
  ctx.strokeStyle=editable?(dark?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.25)'):BD;ctx.lineWidth=editable?1:.5;ctx.setLineDash(editable?[4,3]:[]);
  ctx.strokeRect(pad,pad,W-2*pad,H-2*pad);ctx.setLineDash([]);
  ctx.font='9px sans-serif';ctx.fillStyle=FGM;ctx.textAlign='center';
  ['0','0.5','1'].forEach((l,i)=>ctx.fillText(l,sc(i*.5,W,pad),H-pad+11));
  ctx.textAlign='right';['0','0.5','1'].forEach((l,i)=>ctx.fillText(l,pad-3,H-sc(i*.5,H,pad)+3));

  const f=editable?ifeat:feats(curT,curK);
  const pf=feats(curT,curK);
  const nb=curP>=1?nbrs(FOCUS,curT):[];

  if(editable){
    const knnEdges=computeKNN(curKNN);
    knnEdges.forEach(([u,v])=>{
      const x0=sc(ifeat[u][0],W,pad),y0=H-sc(ifeat[u][1],H,pad);
      const x1=sc(ifeat[v][0],W,pad),y1=H-sc(ifeat[v][1],H,pad);
      ctx.strokeStyle=dark?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.18)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();ctx.setLineDash([]);
    });
  }
  if(trail&&!editable){
    for(let pt=1;pt<=curT;pt++){
      const a=feats(pt-1,curK),b=feats(pt,curK);
      NODES.forEach(n=>{const x0=sc(a[n.id][0],W,pad),y0=H-sc(a[n.id][1],H,pad),x1=sc(b[n.id][0],W,pad),y1=H-sc(b[n.id][1],H,pad);ctx.strokeStyle=NC;ctx.globalAlpha=.15;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();ctx.globalAlpha=1;});
    }
  }
  if(curP===2&&!editable&&nb.length>0){
    const ag=[0,0];nb.forEach(ni=>{ag[0]+=pf[ni][0];ag[1]+=pf[ni][1];});ag[0]/=nb.length;ag[1]/=nb.length;
    const cx=sc(ag[0],W,pad),cy=H-sc(ag[1],H,pad),fx=sc(pf[FOCUS][0],W,pad),fy=H-sc(pf[FOCUS][1],H,pad);
    ctx.strokeStyle=NC;ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.globalAlpha=.5;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(cx,cy);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle=NC;ctx.globalAlpha=.55;ctx.fill();ctx.globalAlpha=1;
    ctx.font='10px sans-serif';ctx.fillStyle=NC;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('M_v',cx,cy-9);
  }
  if(curP===1&&!editable){
    nb.forEach(ni=>{
      const nx=sc(pf[ni][0],W,pad),ny=H-sc(pf[ni][1],H,pad),fx=sc(pf[FOCUS][0],W,pad),fy=H-sc(pf[FOCUS][1],H,pad);
      const a=Math.min(1,ap),ax=nx+(fx-nx)*a,ay=ny+(fy-ny)*a;
      ctx.strokeStyle=NC;ctx.lineWidth=1;ctx.globalAlpha=.3;ctx.beginPath();ctx.moveTo(nx,ny);ctx.lineTo(ax,ay);ctx.stroke();
      ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(ax,ay,4,0,Math.PI*2);ctx.fillStyle=NC;ctx.fill();ctx.globalAlpha=1;
    });
  }
  NODES.forEach(n=>{
    const iF=n.id===FOCUS&&curP>0&&!editable,iN=nb.includes(n.id)&&!editable,iD=fdrag===n.id;
    let fx=f[n.id][0],fy=f[n.id][1];
    if(curP===3&&!editable&&n.id===FOCUS){const nf=feats(Math.min(curT+1,T_MAX),curK);fx=pf[n.id][0]+(nf[n.id][0]-pf[n.id][0])*Math.min(1,ap);fy=pf[n.id][1]+(nf[n.id][1]-pf[n.id][1])*Math.min(1,ap);}
    const x=sc(fx,W,pad),y=H-sc(fy,H,pad),r=iF?8:iN?7:6;
    if(editable||iF||iN){ctx.beginPath();ctx.arc(x,y,r+5,0,Math.PI*2);ctx.fillStyle=NL;ctx.globalAlpha=iD?.6:.25;ctx.fill();ctx.globalAlpha=1;}
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=(iF||iN||iD||editable)?NC:NL;ctx.fill();
    ctx.strokeStyle=BG;ctx.lineWidth=iD?2:1.5;ctx.stroke();
    if(iD&&editable){ctx.beginPath();ctx.arc(x,y,r+2,0,Math.PI*2);ctx.strokeStyle=NC;ctx.lineWidth=1.5;ctx.stroke();}
    ctx.font='10px sans-serif';
    ctx.fillStyle=(editable||iF||iN)?'#fff':NC;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.lbl,x,y);
    if(editable){ctx.font='8px sans-serif';ctx.fillStyle=FGM;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(`${fx.toFixed(2)},${fy.toFixed(2)}`,x,y-r-4);}
    else{ctx.font='9px sans-serif';ctx.fillStyle=FG;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(n.lbl,x,y-r-3);}
  });
}

function buildTL(){
  const tl=document.getElementById('tl');tl.innerHTML='';
  for(let t=0;t<=T_MAX;t++){
    const col=document.createElement('div');col.className='tl-t';
    col.innerHTML=`<div class="tl-h">t=${t}</div><div class="tl-ps" id="tlp${t}"></div>`;
    tl.appendChild(col);
    const row=col.querySelector('.tl-ps');
    PH.forEach((name,p)=>{
      const cell=document.createElement('div');const gs=t*4+p,cs=stepIdx();
      cell.className='tl-p'+(t===curT&&p===curP?' active':gs<cs?' done':'');
      cell.textContent=name;cell.title=`t=${t}, ${name}`;cell.onclick=()=>{curT=t;curP=p;startAnim();};
      row.appendChild(cell);
    });
  }
}

function stepIdx(){return curT*4+curP;}
function totalSteps(){return(T_MAX+1)*4;}

function startAnim(){
  cancelAnimationFrame(afr);ap=0;
  const dur=curP===0?0:700,start=performance.now();
  function step(now){ap=Math.min(1,(now-start)/dur);draw();if(ap<1)afr=requestAnimationFrame(step);}
  afr=requestAnimationFrame(step);buildTL();updateUI();
}
function draw(){drawGraph();drawFeature();}

function updateUI(){
  const ed=isInit();
  document.getElementById('epill').style.display=ed?'':'none';
  document.getElementById('fHint').textContent=ed?'Drag nodes to reposition embeddings. Edges update live via kNN.':'';
  document.getElementById('gHint').textContent='';
  document.getElementById('knnv').textContent=curKNN;
  document.getElementById('desc').innerHTML=`<span class="mono">${FORM[curP]}</span>&nbsp;&nbsp;<span style="color:${FGM}">${DESC[curP](curT)}</span>`;
  const cur=stepIdx(),total=totalSteps()-1;
  document.getElementById('sind').textContent=`Step ${cur+1} of ${total+1}`;
  document.getElementById('prevBtn').disabled=cur===0;document.getElementById('nextBtn').disabled=cur===total;
  document.getElementById('kv').textContent=curK;
  document.getElementById('trailBtn').className='tgl'+(trail?' on':'');
  document.getElementById('playBtn').textContent=playing?'Pause':'Play';document.getElementById('playBtn').className='tgl'+(playing?' on':'');
  document.getElementById('legend').innerHTML=`<div class="li"><div class="ld" style="background:${NC}"></div>node</div><div class="li"><div class="ld" style="background:#378ADD;border-radius:2px"></div>new temporal edges</div><div class="li"><div class="ld" style="background:${dark?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.25)'};border-radius:2px"></div>kNN edges (t=0)</div>`;
  const f0=ifeat,ft=feats(curT,curK);
  const disps=NODES.map(n=>Math.hypot(ft[n.id][0]-f0[n.id][0],ft[n.id][1]-f0[n.id][1]));
  const avgDisp=disps.reduce((a,b)=>a+b,0)/disps.length;
  const maxDisp=Math.max(...disps);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="sv">${computeKNN(curKNN).length}</div><div class="sl">kNN edges (t=0)</div></div>
    <div class="stat"><div class="sv">${edges(curT).length}</div><div class="sl">total edges t=${curT}</div></div>
    <div class="stat"><div class="sv">${avgDisp.toFixed(3)}</div><div class="sl">avg displacement</div></div>
    <div class="stat"><div class="sv">${maxDisp.toFixed(3)}</div><div class="sl">max displacement</div></div>`;
}

function navigate(d){let s=Math.max(0,Math.min(totalSteps()-1,stepIdx()+d));curT=Math.floor(s/4);curP=s%4;startAnim();}
function onLayer(v){curK=v;startAnim();}
function onKnn(v){curKNN=v;startAnim();}
function toggleTrail(){trail=!trail;draw();buildTL();}
function resetAll(){gpos=D_GPOS.map(p=>[...p]);ifeat=D_FEAT.map(f=>[...f]);curT=0;curP=0;startAnim();}
function togglePlay(){
  playing=!playing;updateUI();
  if(playing){if(stepIdx()>=totalSteps()-1){curT=0;curP=0;}ptimer=setInterval(()=>{const s=stepIdx()+1;if(s>=totalSteps()){playing=false;clearInterval(ptimer);updateUI();return;}curT=Math.floor(s/4);curP=s%4;startAnim();},900);}
  else clearInterval(ptimer);
}
window.addEventListener('resize',()=>{draw();});
initDrags();startAnim();
</script>
